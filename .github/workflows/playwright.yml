name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    # Run inside the official Playwright image: browsers are preinstalled and,
    # critically, font rendering matches the *-linux.png visual baselines that
    # were generated in this same image. The version MUST track the
    # @playwright/test version in package.json.
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-jammy
      # --ipc=host gives browsers a full-size /dev/shm; without it Chromium and
      # Firefox crash ("Target crashed") under concurrency on the small default.
      options: --ipc=host

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Run Playwright tests
        run: npx playwright test

      # The HTML report is the main review artifact - browsable results with
      # diffs, traces, and videos for any failure. Uploaded whether the run
      # passed or failed (but not if the job was cancelled).
      - name: Upload HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      # Raw per-test output (traces, failure screenshots/videos, visual diff
      # PNGs). Only useful when something failed, so upload only then.
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14
